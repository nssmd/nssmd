      World Models
    </text>

    <rect x="324" width="126" height="34" rx="17" fill="#0F172A" fill-opacity="0.42" stroke="#5EEAD4" stroke-opacity="0.45" />
    <text x="348" y="22" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">
      MLLM Eval

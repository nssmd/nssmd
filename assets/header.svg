<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zimo Wen banner</title>
  <desc id="desc">Personal homepage banner for Zimo Wen, a CS student at SJTU focused on embodied intelligence, multimodal models, and research engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="24" x2="1138" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" />
      <stop offset="0.52" stop-color="#0B3B66" />
      <stop offset="1" stop-color="#0F766E" />
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 72) rotate(135) scale(210 180)">
      <stop stop-color="#38BDF8" stop-opacity="0.9" />
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1140 210) rotate(180) scale(320 220)">
      <stop stop-color="#2DD4BF" stop-opacity="0.65" />
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0" />
    </radialGradient>
    <filter id="blur" x="-120" y="-120" width="1440" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="32" />
    </filter>
  </defs>

  <rect x="18" y="18" width="1164" height="244" rx="28" fill="url(#bg)" />
  <g filter="url(#blur)">
    <ellipse cx="1010" cy="72" rx="176" ry="132" fill="url(#glowA)" />
    <ellipse cx="1132" cy="214" rx="252" ry="164" fill="url(#glowB)" />
  </g>

  <g opacity="0.18" stroke="#93C5FD" stroke-width="1.4">
    <path d="M830 54H1128" />
    <path d="M830 96H1128" />
    <path d="M830 138H1128" />
    <path d="M830 180H1128" />
    <path d="M830 222H1128" />
    <path d="M868 36V240" />
    <path d="M924 36V240" />
    <path d="M980 36V240" />
    <path d="M1036 36V240" />
    <path d="M1092 36V240" />
  </g>

  <g opacity="0.9">
    <circle cx="884" cy="84" r="9" fill="#E2E8F0" />
    <circle cx="984" cy="126" r="12" fill="#38BDF8" />
    <circle cx="1082" cy="84" r="10" fill="#2DD4BF" />
    <circle cx="1026" cy="204" r="14" fill="#F8FAFC" />
    <path d="M884 84L984 126L1082 84L1026 204L884 84Z" stroke="#E2E8F0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.72" />
  </g>

  <text x="82" y="98" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="0.4">
    Zimo Wen
  </text>
  <text x="84" y="136" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
    SJTU | Zhiyuan Honors Program | MVIG Lab
  </text>
  <text x="84" y="176" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="500">
    Embodied Intelligence, Multimodal Models, and Research Engineering
  </text>

  <g transform="translate(82 204)">
    <rect width="148" height="34" rx="17" fill="#0F172A" fill-opacity="0.42" stroke="#7DD3FC" stroke-opacity="0.45" />

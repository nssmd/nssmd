<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Research map</title>
  <desc id="desc">A visual map of Zimo Wen's research directions covering embodied intelligence, multimodal models, world models, and evaluation infrastructure.</desc>
  <defs>
    <linearGradient id="panel" x1="56" y1="36" x2="1146" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" />
      <stop offset="1" stop-color="#0B3B66" />
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="240" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E" />
      <stop offset="1" stop-color="#115E59" />
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="240" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8" />
      <stop offset="1" stop-color="#1E3A8A" />
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="240" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="240" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1" />
      <stop offset="1" stop-color="#0F3A5D" />
    </linearGradient>
  </defs>

  <rect x="18" y="18" width="1164" height="384" rx="28" fill="url(#panel)" />
  <rect x="54" y="60" width="240" height="132" rx="24" fill="url(#cardA)" />
  <rect x="906" y="60" width="240" height="132" rx="24" fill="url(#cardB)" />
  <rect x="54" y="228" width="240" height="132" rx="24" fill="url(#cardC)" />
  <rect x="906" y="228" width="240" height="132" rx="24" fill="url(#cardD)" />

  <path d="M294 126H450" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10" opacity="0.7" />
  <path d="M750 126H906" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10" opacity="0.7" />
  <path d="M294 294H450" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10" opacity="0.7" />
  <path d="M750 294H906" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10" opacity="0.7" />

  <rect x="450" y="92" width="300" height="236" rx="34" fill="#0F172A" stroke="#60A5FA" stroke-opacity="0.5" stroke-width="2" />
  <text x="600" y="146" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    Research Map
  </text>
  <text x="600" y="184" text-anchor="middle" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">
    building systems that connect models,
  </text>
  <text x="600" y="210" text-anchor="middle" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">
    interaction, and measurable evaluation
  </text>

  <g transform="translate(497 242)">
    <rect width="88" height="30" rx="15" fill="#0F766E" fill-opacity="0.95" />
    <text x="44" y="20" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
      VLA
    </text>
    <rect x="98" width="116" height="30" rx="15" fill="#1D4ED8" fill-opacity="0.95" />
    <text x="156" y="20" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
      World Models
    </text>
    <rect x="224" width="62" height="30" rx="15" fill="#0369A1" fill-opacity="0.95" />
    <text x="255" y="20" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
      Eval
    </text>
  </g>

  <text x="78" y="102" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Embodied Intelligence
  </text>
  <text x="78" y="132" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    force-aware interaction
  </text>
  <text x="78" y="156" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    teleoperation and real-world VLA systems
  </text>

  <text x="930" y="102" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Multimodal Models
  </text>
  <text x="930" y="132" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    unified understanding and generation
  </text>
  <text x="930" y="156" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    scaling behavior and reasoning systems
  </text>

  <text x="78" y="270" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Evaluation + Infra
  </text>
  <text x="78" y="300" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    UniG2U, lmms-eval, benchmark workflows
  </text>
  <text x="78" y="324" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    reproducible tooling for research iteration
  </text>

  <text x="930" y="270" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Data-Efficient Learning
  </text>
  <text x="930" y="300" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    retrieval-inspired prediction and adaptation
  </text>
  <text x="930" y="324" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    few-shot modeling for structured domains
  </text>
</svg>
